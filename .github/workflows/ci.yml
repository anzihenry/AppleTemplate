name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --strict

  format:
    name: SwiftFormat
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftFormat
        run: brew install swiftformat
      - name: Check formatting
        run: swiftformat . --lint

  build:
    name: Build
    runs-on: macos-14
    strategy:
      matrix:
        destination:
          - "platform=iOS Simulator,name=iPhone 15,OS=17.2"
          - "platform=macOS,arch=arm64"
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Build iOS
        run: |
          xcodebuild build \
            -project AppleTemplate.xcodeproj \
            -scheme "AppleTemplate-iOS" \
            -destination "${{ matrix.destination }}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  test:
    name: Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Run Tests
        run: |
          xcodebuild test \
            -project AppleTemplate.xcodeproj \
            -scheme "AppleTemplate-Tests" \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=17.2" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES
