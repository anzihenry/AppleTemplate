name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --strict

  format:
    name: SwiftFormat
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftFormat
        run: brew install swiftformat
      - name: Check formatting
        run: swiftformat . --lint

  validate:
    name: Validate Template
    runs-on: macos-26
    needs: [lint, format]
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Run Validation Script
        run: |
          chmod +x validate.sh
          ./validate.sh ValidateDemo

  build:
    name: Build
    runs-on: macos-26
    needs: [lint, format]
    strategy:
      matrix:
        destination:
          - "platform=iOS Simulator,name=iPhone 17,OS=26.0"
          - "platform=macOS,arch=arm64"
          - "platform=watchOS Simulator,name=Apple Watch Ultra 2 (49mm),OS=26.0"
          - "platform=tvOS Simulator,name=Apple TV,OS=26.0"
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Project
        run: ./setup.sh AppleTemplate
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Build
        run: |
          xcodebuild build \
            -project AppleTemplate.xcodeproj \
            -scheme "AppleTemplate-iOS" \
            -destination "${{ matrix.destination }}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  test:
    name: Test
    runs-on: macos-26
    needs: [lint, format]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Project
        run: ./setup.sh AppleTemplate
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Run Tests
        run: |
          xcodebuild test \
            -project AppleTemplate.xcodeproj \
            -scheme "AppleTemplate-Tests" \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=26.0" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES
