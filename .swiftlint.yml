disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - explicit_init
  - redundant_nil_coalescing
  - closure_spacing
  - contains_over_first_not_nil
  - discouraged_object_literal
  - empty_collection_literal
  - empty_string
  - explicit_init
  - first_where
  - flatmap_over_map_reduce
  - implicit_return
  - joined_default_parameter
  - last_where
  - modified_iterating
  - overridden_super_call
  - pattern_matching_keywords
  - prohibited_super_call
  - reduce_into
  - sorted_first_last
  - sorted_imports
  - unneeded_parentheses_in_closure_argument

line_length:
  warning: 120
  error: 200

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 15

nesting:
  type_level: 2
  function_level: 3

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 60

type_name:
  min_length:
    warning: 3
    error: 1
  max_length:
    warning: 50
    error: 60

excluded:
  - .build
  - Packages/.build
  - DerivedData
  - vendor
